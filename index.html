<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITパス攻略 V4 (Mobile Optimized)</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --bg: #f0f2f5; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        /* 達成度バー */
        .status-card { background: white; width: 100%; max-width: 400px; padding: 12px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; box-sizing: border-box; }
        .progress-container { background: #eee; height: 12px; border-radius: 6px; overflow: hidden; }
        #progress-bar { background: var(--success); width: 0%; height: 100%; transition: 0.5s; }

        /* カードデザイン */
        #display {
            width: 100%; max-width: 400px; height: 220px;
            background: white; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; margin-bottom: 20px; border: none; text-align: center; box-sizing: border-box;
        }

        /* 巨大ボタンエリア */
        .btn-group { width: 100%; max-width: 400px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .huge-btn { height: 80px; font-size: 18px; font-weight: bold; border: none; border-radius: 15px; color: white; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.2); transition: 0.1s; }
        .huge-btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-ok { background: var(--success); }
        .btn-ng { background: var(--danger); }
        .btn-next { background: var(--primary); grid-column: span 2; height: 60px; margin-top: 10px; }

        /* 設定エリア */
        .settings { font-size: 12px; color: #666; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
        input[type="number"] { width: 40px; padding: 5px; border-radius: 5px; border: 1px solid #ccc; text-align: center; }
    </style>
</head>
<body>

    <div class="status-card">
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div style="display: flex; justify-content: space-between; margin-top: 5px; font-size: 12px;">
            <span id="progress-text">覚えた: 0 / 0</span>
            <span>セット内: <b id="solved-num">1</b> / <b id="limit-display">5</b> 問目</span>
        </div>
    </div>

    <div id="display" onclick="flipCard()">
        <div id="main-text" style="font-size: 28px; font-weight: bold; padding: 0 15px;">タップして開始</div>
        <div id="sub-text" style="font-size: 14px; color: #6c757d; margin-top: 15px; min-height: 1.2em;"></div>
    </div>

    <div id="controls" style="display: none; width: 100%; max-width: 400px;">
        <div id="judge-btns" class="btn-group">
            <button class="huge-btn btn-ok" onclick="judge(true)">〇 覚えた</button>
            <button class="huge-btn btn-ng" onclick="judge(false)">× 苦手</button>
        </div>
        <button id="next-btn" class="huge-btn btn-next" style="display:none;" onclick="next()">次の問題へ ＞</button>
    </div>

    <div class="settings">
        <label><input type="checkbox" id="reverse-mode" onchange="resetCard()"> 和訳から</label>
        <label><input type="checkbox" id="weak-mode" onchange="resetCard()"> 苦手克服🔥</label>
        <label>1セット: <input type="number" id="limit-num" value="5" min="1"></label>
    </div>

    <div style="margin-top: 20px; width: 100%; max-width: 400px; text-align: center; border-top: 1px solid #ddd; padding-top: 20px;">
        <button onclick="exportData()" style="padding: 10px; font-size: 11px;">📥 バックアップ</button>
        <label style="padding: 10px; font-size: 11px; background: #eee; border-radius: 5px; margin-left: 5px;">
            📤 復元 <input type="file" onchange="importData(event)" style="display:none;">
        </label>
        <br><br>
        <div style="display: flex; gap: 5px; justify-content: center;">
            <input type="text" id="new-q" placeholder="略称" style="width: 50px;">
            <input type="text" id="new-a" placeholder="和訳" style="width: 100px;">
            <input type="text" id="new-full" placeholder="Full" style="width: 100px;">
            <button onclick="addCard()">＋</button>
        </div>
        <button onclick="clearAllData()" style="margin-top: 20px; color: #999; background: none; border: none; font-size: 10px;">初期化</button>
    </div>

    <script>
        let savedData = localStorage.getItem("myQuizData");
        let originalData = savedData ? JSON.parse(savedData) : [
            { q: "CSR", a: "企業の社会的責任", full: "Corporate Social Responsibility", correct: 0, miss: 0 },
            { q: "SaaS", a: "ソフトウェアをネット経由で提供", full: "Software as a Service", correct: 0, miss: 0 },
            { q: "BCP", a: "事業継続計画", full: "Business Continuity Plan", correct: 0, miss: 0 }
        ];

        let shuffleList = [];
        let index = 0;
        let solvedCount = 0;
        let isFront = true;

        function saveData() { localStorage.setItem("myQuizData", JSON.stringify(originalData)); updateProgress(); }

        function shuffle() {
            const isWeakMode = document.getElementById("weak-mode").checked;
            let baseList = isWeakMode ? originalData.filter(item => (item.miss || 0) > 0) : [...originalData];
            if (isWeakMode && baseList.length === 0) { baseList = [...originalData]; document.getElementById("weak-mode").checked = false; }
            shuffleList = baseList;
            for (let i = shuffleList.length - 1; i > 0; i--) {
                let r = Math.floor(Math.random() * (i + 1));
                [shuffleList[i], shuffleList[r]] = [shuffleList[r], shuffleList[i]];
            }
        }

        function render() {
            const main = document.getElementById("main-text");
            const sub = document.getElementById("sub-text");
            const isReverse = document.getElementById("reverse-mode").checked;
            const limit = parseInt(document.getElementById("limit-num").value) || 5;
            if (shuffleList.length === 0) return;
            const item = shuffleList[index];
            if (!isReverse) { main.innerText = isFront ? item.q : item.a; } else { main.innerText = isFront ? item.a : item.q; }
            sub.innerText = !isFront ? (item.full || "") : "";
            document.getElementById("display").style.backgroundColor = isFront ? "white" : "#fff9c4";
            document.getElementById("solved-num").innerText = solvedCount + 1;
            document.getElementById("limit-display").innerText = limit;
            updateProgress();
        }

        function judge(isCorrect) {
            const item = shuffleList[index];
            if (isCorrect) { item.correct = (item.correct || 0) + 1; } else { item.miss = (item.miss || 0) + 1; }
            saveData();
            document.getElementById("judge-btns").style.display = "none";
            document.getElementById("next-btn").style.display = "block";
        }

        function flipCard() {
            isFront = !isFront; render();
            if (!isFront) { document.getElementById("controls").style.display = "block"; document.getElementById("judge-btns").style.display = "grid"; document.getElementById("next-btn").style.display = "none"; }
        }

        function next() {
            index++; solvedCount++;
            const limit = parseInt(document.getElementById("limit-num").value) || 5;
            if (index >= shuffleList.length || solvedCount >= limit) { alert("1セット終了！"); index = 0; solvedCount = 0; shuffle(); }
            isFront = true; render();
            document.getElementById("controls").style.display = "none";
        }

        function updateProgress() {
            const mastered = originalData.filter(item => (item.correct || 0) > 0).length;
            const total = originalData.length;
            const percent = total > 0 ? (mastered / total) * 100 : 0;
            document.getElementById("progress-bar").style.width = percent + "%";
            document.getElementById("progress-text").innerText = `覚えた: ${mastered} / ${total}`;
        }

        function addCard() {
            const q = document.getElementById("new-q").value;
            const a = document.getElementById("new-a").value;
            const f = document.getElementById("new-full").value;
            if (!q || !a) return;
            originalData.push({ q: q, a: a, full: f, correct: 0, miss: 0 });
            saveData();
            document.getElementById("new-q").value = ""; document.getElementById("new-a").value = ""; document.getElementById("new-full").value = "";
            resetCard();
        }

        function resetCard() { index = 0; solvedCount = 0; isFront = true; shuffle(); render(); }
        function exportData() {
            const blob = new Blob([JSON.stringify(originalData, null, 2)], {type: "application/json"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "it-passport-backup.json"; a.click();
        }
        function importData(event) {
            const reader = new FileReader();
            reader.onload = (e) => { originalData = JSON.parse(e.target.result); saveData(); location.reload(); };
            reader.readAsText(event.target.files[0]);
        }
        function clearAllData() { if (confirm("初期化？")) { localStorage.removeItem("myQuizData"); location.reload(); } }

        shuffle(); render();
    </script>
</body>
</html>
